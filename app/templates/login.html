<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ event_name }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-body">
  <main class="auth-card">
    <img class="brand-logo auth-logo" src="/static/uploads/logo2026.png" alt="{{ event_name }}">
    <h1>{{ event_name }}</h1>
    <p>Digite seu código de acesso</p>
    <form method="post" action="/login" class="stack">
      <input class="code-input" name="code" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" autocomplete="one-time-code" required autofocus>
      {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
      <button class="btn primary" type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
